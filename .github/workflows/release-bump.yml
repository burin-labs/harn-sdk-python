name: Release Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0 or 0.1.0a1)"
        required: true
        type: string
      create_prerelease:
        description: "Mark GitHub release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  bump-tag-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bump version files
        run: |
          python scripts/bump_version.py "${{ inputs.version }}"
          python scripts/check_version_sync.py

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/harn/__init__.py
          git commit -m "release: v${{ inputs.version }}"

      - name: Tag release
        run: git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=""
          if [ "${{ inputs.create_prerelease }}" = "true" ]; then
            ARGS="--prerelease"
          fi
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes "Automated release for v${{ inputs.version }}" \
            $ARGS
